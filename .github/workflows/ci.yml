name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  templates-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Smoke test
        run: npm run test:smoke

      - name: Release determinism check
        run: |
          CONFIG=config/example.templates.json
          PAYLOAD=tests/fixtures/release-payload.json
          PROFILES=$(paste -sd, tests/fixtures/release-profiles.txt)

          rm -rf var/release-a var/release-b
          bin/templates "$CONFIG" gateway:release:build "$PROFILES" "@$PAYLOAD" var/release-a ci
          bin/templates "$CONFIG" gateway:release:build "$PROFILES" "@$PAYLOAD" var/release-b ci

          node - <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');

          function hashFile(path) {
            const bytes = fs.readFileSync(path);
            return crypto.createHash('sha256').update(bytes).digest('hex');
          }

          function readJson(path) {
            return JSON.parse(fs.readFileSync(path, 'utf8'));
          }

          function sortedKeys(obj) {
            return Object.keys(obj).sort((a, b) => a.localeCompare(b));
          }

          const a = readJson('var/release-a/manifest.json');
          const b = readJson('var/release-b/manifest.json');

          const keysA = sortedKeys(a.variants || {});
          const keysB = sortedKeys(b.variants || {});
          if (JSON.stringify(keysA) !== JSON.stringify(keysB)) {
            throw new Error(`variant key mismatch: ${keysA.join(',')} != ${keysB.join(',')}`);
          }

          for (const key of keysA) {
            const one = a.variants[key];
            const two = b.variants[key];
            for (const field of ['variant', 'templateId', 'file', 'sha256', 'bytes']) {
              if (JSON.stringify(one[field]) !== JSON.stringify(two[field])) {
                throw new Error(`manifest field mismatch at ${key}.${field}`);
              }
            }

            const fileA = `var/release-a/${one.file}`;
            const fileB = `var/release-b/${two.file}`;
            if (hashFile(fileA) !== hashFile(fileB)) {
              throw new Error(`artifact hash mismatch for ${key}`);
            }
          }

          const stableA = { ...a, generatedAt: '__IGNORED__' };
          const stableB = { ...b, generatedAt: '__IGNORED__' };
          if (JSON.stringify(stableA) !== JSON.stringify(stableB)) {
            throw new Error('manifest mismatch outside generatedAt');
          }
          NODE
