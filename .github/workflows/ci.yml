name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  php-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: PHP lint
        run: |
          find src bin config tests -type f \( -name "*.php" \) -print0 | xargs -0 -n1 php -l

      - name: Smoke test
        run: php tests/SmokeTest.php
