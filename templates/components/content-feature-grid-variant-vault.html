<section class="rounded-[2rem] border border-white/10 bg-[#08101d] px-5 py-6 text-slate-100 shadow-[0_24px_80px_rgba(2,6,23,0.46)] md:px-8 md:py-8">
  <div class="relative overflow-hidden rounded-[1.7rem] border border-white/10 bg-[radial-gradient(circle_at_top_left,rgba(34,211,238,0.14),transparent_35%),linear-gradient(180deg,rgba(15,23,42,0.96),rgba(8,16,29,0.98))] px-5 py-6 md:px-7 md:py-7">
    <div class="absolute inset-0 opacity-40 [background-image:linear-gradient(rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.05)_1px,transparent_1px)] [background-size:2.25rem_2.25rem]"></div>

    <div class="relative grid gap-7 lg:grid-cols-[0.8fr_1.2fr] lg:items-start">
      <div class="space-y-4">
        <span class="inline-flex rounded-full border border-amber-200/20 bg-amber-200/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-amber-100">
          {{SECTION_LABEL}}
        </span>
        <h2 class="text-balance font-display text-3xl font-black leading-tight tracking-[-0.03em] text-white md:text-4xl">
          {{HEADING}}
        </h2>
        <p class="max-w-xl text-pretty text-base leading-7 text-slate-300">
          {{SUBHEADING}}
        </p>

        <div class="flex flex-wrap gap-3">
          <a
            href="{{PRIMARY_CTA_HREF}}"
            class="inline-flex items-center justify-center rounded-full bg-amber-200 px-5 py-3 text-sm font-black uppercase tracking-[0.16em] text-slate-950 transition hover:bg-amber-100"
          >
            {{PRIMARY_CTA_LABEL}}
          </a>
          <a
            href="{{SECONDARY_CTA_HREF}}"
            class="inline-flex items-center justify-center rounded-full border border-white/12 bg-white/5 px-5 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-slate-100 transition hover:bg-white/10"
          >
            {{SECONDARY_CTA_LABEL}}
          </a>
        </div>
      </div>

      <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
        {{FEATURE_CARDS_HTML}}
      </div>
    </div>
  </div>
</section>
