<section class="rounded-[2rem] border border-slate-200/60 bg-[linear-gradient(180deg,#f8fafc,#eef2ff)] px-5 py-6 text-slate-950 shadow-[0_24px_80px_rgba(15,23,42,0.14)] md:px-8 md:py-8">
  <div class="grid gap-6 lg:grid-cols-[0.8fr_1.2fr] lg:items-start">
    <div class="space-y-4">
      <span class="inline-flex rounded-full border border-sky-300/40 bg-sky-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.24em] text-sky-900">
        {{SECTION_LABEL}}
      </span>
      <h2 class="text-balance font-display text-3xl font-black leading-tight tracking-[-0.04em] text-slate-950 md:text-4xl">
        {{HEADING}}
      </h2>
      <p class="max-w-xl text-pretty text-base leading-7 text-slate-600">
        {{SUBHEADING}}
      </p>
      <div class="rounded-[1.4rem] border border-slate-200 bg-white p-4">
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">{{HELP_LABEL}}</p>
        <p class="mt-2 text-sm leading-6 text-slate-700">{{HELP_TEXT}}</p>
      </div>
    </div>

    <div class="rounded-[1.6rem] border border-slate-200 bg-white p-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.7)]">
      <div id="{{FAQ_ROOT_ID}}" class="space-y-3">
        {{FAQ_ITEMS_HTML}}
      </div>
    </div>
  </div>

  <script>
    (function () {
      const root = document.getElementById("{{FAQ_ROOT_ID}}");
      if (!root) return;

      const items = Array.from(root.querySelectorAll("[data-faq-item]"));
      const triggers = items
        .map((item, index) => {
          const trigger = item.querySelector("[data-faq-trigger]");
          const panel = item.querySelector("[data-faq-panel]");
          if (!trigger || !panel) return null;

          const triggerId = trigger.id || "faq-trigger-" + index;
          const panelId = panel.id || "faq-panel-" + index;
          trigger.id = triggerId;
          panel.id = panelId;
          trigger.setAttribute("aria-controls", panelId);
          trigger.setAttribute("aria-expanded", trigger.getAttribute("aria-expanded") || "false");
          panel.setAttribute("role", "region");
          panel.setAttribute("aria-labelledby", triggerId);
          panel.hidden = trigger.getAttribute("aria-expanded") !== "true";
          return { trigger, panel };
        })
        .filter(Boolean);

      function setOpen(targetTrigger, isOpen) {
        const target = triggers.find((entry) => entry.trigger === targetTrigger);
        if (!target) return;
        target.trigger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        target.panel.hidden = !isOpen;
      }

      function toggle(trigger) {
        const current = trigger.getAttribute("aria-expanded") === "true";
        setOpen(trigger, !current);
      }

      triggers.forEach(({ trigger }) => {
        trigger.addEventListener("click", () => toggle(trigger));
        trigger.addEventListener("keydown", (event) => {
          const index = triggers.findIndex((entry) => entry.trigger === trigger);
          if (index < 0) return;

          let nextIndex = null;
          switch (event.key) {
            case "ArrowDown":
            case "ArrowRight":
              nextIndex = (index + 1) % triggers.length;
              break;
            case "ArrowUp":
            case "ArrowLeft":
              nextIndex = (index - 1 + triggers.length) % triggers.length;
              break;
            case "Home":
              nextIndex = 0;
              break;
            case "End":
              nextIndex = triggers.length - 1;
              break;
            case "Enter":
            case " ":
              event.preventDefault();
              toggle(trigger);
              return;
            default:
              return;
          }

          if (nextIndex !== null) {
            event.preventDefault();
            triggers[nextIndex].trigger.focus();
          }
        });
      });
    })();
  </script>
</section>
