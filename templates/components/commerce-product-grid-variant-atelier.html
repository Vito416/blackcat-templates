<section class="rounded-[1.75rem] border border-white/10 bg-gradient-to-b from-stone-50/95 via-white/90 to-stone-100/80 p-5 shadow-[0_18px_60px_rgba(20,18,16,0.14)] md:p-8" aria-labelledby="commerce-product-grid-atelier-title">
  <div class="mb-6 flex flex-wrap items-start justify-between gap-4 border-b border-stone-900/10 pb-5">
    <div class="max-w-2xl">
      <p class="text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-stone-500">{{PRODUCT_GRID_EYEBROW}}</p>
      <h2 id="commerce-product-grid-atelier-title" class="mt-2 font-display text-3xl tracking-tight text-stone-950 md:text-4xl">{{PRODUCT_GRID_TITLE}}</h2>
      <p class="mt-3 text-sm leading-6 text-stone-600">{{PRODUCT_GRID_LEAD}}</p>
    </div>
    <div class="rounded-2xl border border-stone-900/10 bg-stone-950 px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-stone-50">
      {{PRODUCT_GRID_META}}
    </div>
  </div>

  <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3" role="list" aria-live="polite">
    {{PRODUCT_CARD_ITEMS_HTML}}
  </div>

  <div class="mt-5" aria-live="polite">
    {{PRODUCT_GRID_EMPTY_STATE_HTML}}
  </div>
</section>
