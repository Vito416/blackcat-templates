<section class="relative overflow-hidden rounded-[2rem] border border-white/12 bg-[#07111f] px-5 py-6 text-slate-50 shadow-[0_30px_90px_rgba(2,6,23,0.48)] md:px-8 md:py-8">
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-[-8rem] top-[-7rem] h-72 w-72 rounded-full bg-cyan-400/18 blur-3xl"></div>
    <div class="absolute right-[-6rem] top-12 h-80 w-80 rounded-full bg-fuchsia-400/12 blur-3xl"></div>
    <div class="absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
    <div class="absolute left-1/2 top-1/2 h-[28rem] w-[28rem] -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/10"></div>
    <div class="absolute left-1/2 top-1/2 h-[20rem] w-[20rem] -translate-x-1/2 -translate-y-1/2 rounded-full border border-cyan-300/10"></div>
  </div>

  <div class="relative grid gap-8 md:grid-cols-[1.25fr_0.9fr] md:items-center">
    <div class="space-y-5">
      <div class="flex flex-wrap items-center gap-3">
        <span class="inline-flex items-center gap-2 rounded-full border border-cyan-300/20 bg-cyan-300/10 px-3 py-1 text-[0.7rem] font-semibold uppercase tracking-[0.28em] text-cyan-100">
          <span class="h-2 w-2 rounded-full bg-cyan-300"></span>
          {{SECTION_LABEL}}
        </span>
        <span class="text-xs uppercase tracking-[0.3em] text-slate-400">{{EYEBROW}}</span>
      </div>

      <div class="max-w-3xl space-y-4">
        <h1 class="text-balance font-display text-4xl font-black leading-[0.92] tracking-[-0.04em] text-white md:text-6xl">
          {{HEADING}}
        </h1>
        <p class="max-w-2xl text-pretty text-base leading-7 text-slate-300 md:text-lg">
          {{SUBHEADING}}
        </p>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <a
          href="{{PRIMARY_CTA_HREF}}"
          class="inline-flex items-center justify-center rounded-full bg-cyan-300 px-5 py-3 text-sm font-black uppercase tracking-[0.18em] text-slate-950 transition hover:bg-cyan-200"
        >
          {{PRIMARY_CTA_LABEL}}
        </a>
        <a
          href="{{SECONDARY_CTA_HREF}}"
          class="inline-flex items-center justify-center rounded-full border border-white/15 bg-white/5 px-5 py-3 text-sm font-semibold uppercase tracking-[0.14em] text-slate-100 transition hover:border-white/30 hover:bg-white/10"
        >
          {{SECONDARY_CTA_LABEL}}
        </a>
      </div>

      <div class="grid gap-3 sm:grid-cols-3">
        {{HERO_POINTS_HTML}}
      </div>
    </div>

    <aside class="relative">
      <div class="absolute -inset-1 rounded-[1.75rem] bg-gradient-to-br from-cyan-300/20 via-transparent to-fuchsia-300/20 blur-lg"></div>
      <div class="relative rounded-[1.75rem] border border-white/12 bg-slate-950/70 p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.08)] backdrop-blur-xl md:p-5">
        <div class="grid gap-3 sm:grid-cols-2">
          <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
            <p class="text-[0.7rem] font-semibold uppercase tracking-[0.24em] text-slate-400">{{CALLOUT_LABEL_1}}</p>
            <p class="mt-2 text-2xl font-black tracking-[-0.03em] text-white">{{CALLOUT_VALUE_1}}</p>
            <p class="mt-2 text-sm leading-6 text-slate-300">{{CALLOUT_NOTE_1}}</p>
          </div>
          <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
            <p class="text-[0.7rem] font-semibold uppercase tracking-[0.24em] text-slate-400">{{CALLOUT_LABEL_2}}</p>
            <p class="mt-2 text-2xl font-black tracking-[-0.03em] text-white">{{CALLOUT_VALUE_2}}</p>
            <p class="mt-2 text-sm leading-6 text-slate-300">{{CALLOUT_NOTE_2}}</p>
          </div>
        </div>

        <div class="mt-4 rounded-2xl border border-cyan-300/15 bg-cyan-300/10 p-4">
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-cyan-100">{{SIDEBAR_LABEL}}</p>
          <div class="mt-3 space-y-3">
            {{SIDEBAR_ITEMS_HTML}}
          </div>
        </div>
      </div>
    </aside>
  </div>
</section>
