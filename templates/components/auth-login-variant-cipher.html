<section data-auth-login-root="cipher" class="auth-login auth-login-cipher">
  <style>
    [data-auth-login-root="cipher"] {
      --bg: #061018;
      --panel: rgba(8, 16, 26, 0.88);
      --panel-strong: rgba(14, 25, 39, 0.96);
      --line: rgba(98, 214, 255, 0.28);
      --text: #e6f8ff;
      --muted: #96afba;
      --accent: #57d8ff;
      --accent-2: #66f0c5;
      --danger: #ff6d8f;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      color: var(--text);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 30px;
      background:
        radial-gradient(circle at 18% 20%, rgba(87, 216, 255, 0.18), transparent 30%),
        radial-gradient(circle at 82% 14%, rgba(102, 240, 197, 0.14), transparent 28%),
        linear-gradient(135deg, #08111a, #0c1723 52%, #05090f);
      box-shadow: var(--shadow);
    }

    [data-auth-login-root="cipher"] .auth-login__grid {
      display: grid;
      gap: 1rem;
      padding: 1rem;
    }

    [data-auth-login-root="cipher"] .auth-login__hero,
    [data-auth-login-root="cipher"] .auth-login__card {
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }

    [data-auth-login-root="cipher"] .auth-login__hero {
      padding: 1.25rem;
      min-height: 100%;
    }

    [data-auth-login-root="cipher"] .auth-login__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(87, 216, 255, 0.24);
      background: rgba(87, 216, 255, 0.08);
      color: #bfefff;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    [data-auth-login-root="cipher"] h2 {
      margin: 1rem 0 0.4rem;
      font-size: clamp(1.9rem, 4vw, 3.35rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    [data-auth-login-root="cipher"] .auth-login__subtitle {
      max-width: 36ch;
      color: var(--muted);
      line-height: 1.6;
    }

    [data-auth-login-root="cipher"] .auth-login__signals {
      display: grid;
      gap: 0.65rem;
      margin-top: 1.3rem;
      padding: 0;
      list-style: none;
    }

    [data-auth-login-root="cipher"] .auth-login__signal {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.8rem 0.85rem;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #d7e9f0;
      font-size: 0.92rem;
    }

    [data-auth-login-root="cipher"] .auth-login__signal-mark {
      inline-size: 0.65rem;
      block-size: 0.65rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(87, 216, 255, 0.55);
      flex: 0 0 auto;
    }

    [data-auth-login-root="cipher"] .auth-login__card {
      padding: 1.1rem;
      background: var(--panel-strong);
    }

    [data-auth-login-root="cipher"] .auth-login__form {
      display: grid;
      gap: 0.85rem;
    }

    [data-auth-login-root="cipher"] .auth-login__field {
      display: grid;
      gap: 0.4rem;
    }

    [data-auth-login-root="cipher"] .auth-login__label {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b7c8d1;
    }

    [data-auth-login-root="cipher"] .auth-login__control {
      position: relative;
    }

    [data-auth-login-root="cipher"] input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 18px;
      border: 1px solid rgba(150, 175, 186, 0.22);
      background: rgba(3, 10, 17, 0.82);
      color: var(--text);
      padding: 0.95rem 1rem;
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    [data-auth-login-root="cipher"] input::placeholder {
      color: rgba(150, 175, 186, 0.65);
    }

    [data-auth-login-root="cipher"] input:focus {
      border-color: rgba(87, 216, 255, 0.65);
      box-shadow: 0 0 0 3px rgba(87, 216, 255, 0.15);
      transform: translateY(-1px);
    }

    [data-auth-login-root="cipher"] .auth-login__password-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem;
      align-items: center;
    }

    [data-auth-login-root="cipher"] .auth-login__toggle {
      border: 1px solid rgba(87, 216, 255, 0.24);
      background: rgba(87, 216, 255, 0.08);
      color: var(--text);
      padding: 0.9rem 0.95rem;
      border-radius: 16px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    [data-auth-login-root="cipher"] .auth-login__toggle[aria-pressed="true"] {
      border-color: rgba(102, 240, 197, 0.4);
      background: rgba(102, 240, 197, 0.13);
    }

    [data-auth-login-root="cipher"] .auth-login__meta {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    [data-auth-login-root="cipher"] .auth-login__link {
      color: #aef0ff;
      text-decoration: none;
    }

    [data-auth-login-root="cipher"] .auth-login__link:hover {
      text-decoration: underline;
    }

    [data-auth-login-root="cipher"] .auth-login__submit {
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041017;
      padding: 1rem 1.15rem;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(87, 216, 255, 0.22);
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    [data-auth-login-root="cipher"] .auth-login__submit:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    [data-auth-login-root="cipher"] .auth-login__submit:disabled {
      cursor: progress;
      opacity: 0.72;
      box-shadow: none;
    }

    [data-auth-login-root="cipher"] .auth-login__error {
      min-height: 1.3rem;
      margin: 0;
      border-radius: 16px;
      border: 1px solid rgba(255, 109, 143, 0.26);
      background: rgba(255, 109, 143, 0.08);
      color: #ffd5df;
      padding: 0.75rem 0.9rem;
      font-size: 0.9rem;
    }

    [data-auth-login-root="cipher"] .auth-login__error:empty {
      border-color: transparent;
      background: transparent;
      padding: 0;
      min-height: 0;
    }

    [data-auth-login-root="cipher"] .auth-login__foot {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    @media (min-width: 760px) {
      [data-auth-login-root="cipher"] .auth-login__grid {
        grid-template-columns: 1.08fr 0.92fr;
        padding: 1.25rem;
      }

      [data-auth-login-root="cipher"] .auth-login__hero,
      [data-auth-login-root="cipher"] .auth-login__card {
        padding: 1.35rem;
      }
    }
  </style>

  <div class="auth-login__grid">
    <header class="auth-login__hero">
      <span class="auth-login__eyebrow">{{LOGIN_METHOD}}</span>
      <h2>{{LOGIN_TITLE}}</h2>
      <p class="auth-login__subtitle">{{LOGIN_SUBTITLE}}</p>
      <ul class="auth-login__signals" aria-hidden="true">
        <li class="auth-login__signal"><span class="auth-login__signal-mark"></span>Encrypted exchange lane</li>
        <li class="auth-login__signal"><span class="auth-login__signal-mark"></span>Fast relay challenge checks</li>
        <li class="auth-login__signal"><span class="auth-login__signal-mark"></span>Adaptive access guardrails</li>
      </ul>
    </header>

    <div class="auth-login__card">
      <form class="auth-login__form" action="{{LOGIN_ACTION}}" method="post" novalidate>
        <div class="auth-login__field">
          <label class="auth-login__label" for="cipher-login-identity">Access token</label>
          <input id="cipher-login-identity" name="identity" type="text" autocomplete="username" required placeholder="{{LOGIN_METHOD}}" />
        </div>

        <div class="auth-login__field">
          <label class="auth-login__label" for="cipher-login-password">Secret key</label>
          <div class="auth-login__password-wrap">
            <div class="auth-login__control">
              <input id="cipher-login-password" name="password" type="password" autocomplete="current-password" required placeholder="Enter password" />
            </div>
            <button class="auth-login__toggle" type="button" aria-pressed="false" aria-controls="cipher-login-password">Reveal</button>
          </div>
        </div>

        <div class="auth-login__meta">
          <label>
            <input type="checkbox" name="remember" value="1" />
            Keep session active
          </label>
          <a class="auth-login__link" href="{{FORGOT_HREF}}">Forgot access?</a>
        </div>

        <p class="auth-login__error" aria-live="polite" role="alert"></p>

        <button class="auth-login__submit" type="submit">{{LOGIN_CTA_LABEL}}</button>
      </form>

      <p class="auth-login__foot">
        Submit stays disabled briefly while the client-side handoff runs, then returns control without external scripts.
      </p>
    </div>
  </div>

  <script>
    (function () {
      const root = document.currentScript && document.currentScript.closest('[data-auth-login-root="cipher"]');
      if (!root) return;

      const form = root.querySelector("form");
      const password = root.querySelector('input[type="password"]');
      const toggle = root.querySelector(".auth-login__toggle");
      const errorNode = root.querySelector(".auth-login__error");
      const submit = root.querySelector(".auth-login__submit");

      function setError(message) {
        errorNode.textContent = message || "";
      }

      function invalidFieldNames() {
        return Array.from(form.querySelectorAll("[required]"))
          .filter(function (field) {
            return !field.value.trim();
          })
          .map(function (field) {
            return field.labels && field.labels[0] ? field.labels[0].textContent.trim() : "This field";
          });
      }

      toggle.addEventListener("click", function () {
        const hidden = password.type === "password";
        password.type = hidden ? "text" : "password";
        toggle.setAttribute("aria-pressed", String(hidden));
        toggle.textContent = hidden ? "Hide" : "Reveal";
        password.focus();
      });

      form.addEventListener("input", function () {
        if (errorNode.textContent) setError("");
      });

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        setError("");

        const missing = invalidFieldNames();
        if (missing.length) {
          setError(missing.join(", ") + " required.");
          const firstInvalid = form.querySelector("[required]:invalid") || form.querySelector("[required]");
          if (firstInvalid && typeof firstInvalid.focus === "function") firstInvalid.focus();
          return;
        }

        submit.disabled = true;
        submit.textContent = "Processing...";

        window.setTimeout(function () {
          submit.disabled = false;
          submit.textContent = "{{LOGIN_CTA_LABEL}}";
          setError("");
        }, 900);
      });
    })();
  </script>
</section>
