<section class="rounded-3xl border border-white/20 bg-slate-900/35 p-5 shadow-mesh backdrop-blur-xl md:p-7">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <div>
      <h2 class="font-display text-2xl text-slate-100">Indexed Pages</h2>
      <p class="text-xs uppercase tracking-[0.2em] text-cyan-100/90">{{INDEX_MODE_LABEL}}</p>
    </div>
    <button
      id="gateway-reshuffle"
      type="button"
      class="rounded-xl border border-white/30 bg-white/10 px-3 py-2 text-xs font-semibold uppercase tracking-[0.16em] text-slate-100 transition hover:bg-white/20"
    >
      Reshuffle
    </button>
  </div>
  <ul id="gateway-results-list" class="grid gap-3 md:grid-cols-2"></ul>

  <template id="gateway-result-item-template">
    <li class="rounded-2xl border border-cyan-200/20 bg-slate-950/45 p-4">
      <button type="button" data-result-query class="w-full text-left">
        <strong data-result-title class="block font-semibold text-slate-100"></strong>
        <span data-result-meta class="mt-1 block text-xs text-slate-300"></span>
      </button>
      <a data-result-link target="_blank" rel="noreferrer noopener" class="mt-3 inline-flex text-xs font-semibold uppercase tracking-[0.14em] text-cyan-200">Open</a>
    </li>
  </template>
</section>
