<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{SITE_TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        --bg-0: #091428;
        --bg-1: #1f3a6d;
        --bg-2: #4b7fd8;
        --glass: rgba(255, 255, 255, 0.12);
        --line: rgba(255, 255, 255, 0.28);
        --text: #f7fbff;
        --muted: #d8e9ff;
        --accent: #8df5d0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 15%, var(--bg-2), transparent 45%),
          radial-gradient(circle at 90% 80%, #2a4b8d, transparent 50%),
          linear-gradient(145deg, var(--bg-0), var(--bg-1));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(720px, 100%);
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(135deg, var(--glass), rgba(255, 255, 255, 0.06));
        backdrop-filter: blur(12px);
        padding: 28px;
        box-shadow: 0 24px 70px rgba(0, 8, 28, 0.45);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 5vw, 2.6rem);
        letter-spacing: 0.03em;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
      }

      form {
        margin-top: 22px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      input,
      button {
        border-radius: 12px;
        border: 1px solid var(--line);
        font-size: 1rem;
        padding: 14px 16px;
      }

      input {
        background: rgba(255, 255, 255, 0.92);
        color: #102445;
      }

      button {
        cursor: pointer;
        border-color: transparent;
        background: var(--accent);
        color: #032025;
        font-weight: 700;
      }

      #result {
        margin-top: 18px;
        min-height: 24px;
        color: var(--muted);
      }

      .ok {
        color: #8df5d0;
      }

      .error {
        color: #ffd0d0;
      }

      @media (max-width: 640px) {
        form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <h1>{{SITE_TITLE}}</h1>
      <p>{{SITE_TAGLINE}}</p>
      <form id="search-form">
        <input id="query" type="search" name="query" placeholder="Find route, domain, or page id..." required />
        <button type="submit">Search</button>
      </form>
      <div id="result" aria-live="polite"></div>
    </section>

    <script>
      (function () {
        const form = document.getElementById("search-form");
        const queryInput = document.getElementById("query");
        const result = document.getElementById("result");
        const gatewayOrigin = "{{GATEWAY_ORIGIN}}";
        const action = "{{SEARCH_ACTION}}";

        form.addEventListener("submit", async function (event) {
          event.preventDefault();
          const query = (queryInput.value || "").trim();
          if (!query) {
            result.className = "error";
            result.textContent = "Please enter a search query.";
            return;
          }

          result.className = "";
          result.textContent = "Resolving route...";

          try {
            const response = await fetch(gatewayOrigin + "/template/call", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                action,
                payload: { query },
              }),
            });
            const data = await response.json().catch(function () { return null; });
            if (!response.ok) {
              throw new Error((data && data.error) || "Request failed.");
            }

            const resolved = data && (data.route || data.data || data);
            result.className = "ok";
            result.textContent = "Resolved: " + JSON.stringify(resolved);
          } catch (error) {
            result.className = "error";
            result.textContent = "Search failed: " + (error && error.message ? error.message : String(error));
          }
        });
      })();
    </script>
  </body>
</html>
