<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{SITE_TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f4ee;
        --ink: #1f2a37;
        --muted: #5c6b7a;
        --accent: #115e59;
        --line: #c8c6bf;
        --ok: #0f766e;
        --error: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Fraunces", Georgia, serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(17, 94, 89, 0.07), rgba(17, 94, 89, 0)),
          var(--paper);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      article {
        width: min(760px, 100%);
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 30px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4.8vw, 2.8rem);
        line-height: 1.08;
      }

      .tagline {
        margin-top: 8px;
        color: var(--muted);
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      .search {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-family: "Inter", "Segoe UI", sans-serif;
        font-size: 0.86rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      input,
      button {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 1rem;
      }

      input {
        background: #fff;
      }

      button {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        cursor: pointer;
        font-weight: 600;
      }

      .result {
        margin-top: 16px;
        font-family: "Inter", "Segoe UI", sans-serif;
        font-size: 0.95rem;
        color: var(--muted);
        min-height: 24px;
        overflow-wrap: anywhere;
      }

      .result.ok {
        color: var(--ok);
      }

      .result.error {
        color: var(--error);
      }

      @media (max-width: 680px) {
        article {
          padding: 22px;
        }

        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <article>
      <h1>{{SITE_TITLE}}</h1>
      <p class="tagline">{{SITE_TAGLINE}}</p>
      <section class="search">
        <label for="query">Search the mesh</label>
        <form id="search-form" class="row">
          <input id="query" name="query" type="search" placeholder="Try route:/about or page:contact" required />
          <button type="submit">Resolve</button>
        </form>
        <div id="result" class="result" aria-live="polite"></div>
      </section>
    </article>

    <script>
      (function () {
        const gatewayOrigin = "{{GATEWAY_ORIGIN}}";
        const action = "{{SEARCH_ACTION}}";
        const form = document.getElementById("search-form");
        const queryInput = document.getElementById("query");
        const result = document.getElementById("result");

        form.addEventListener("submit", async function (event) {
          event.preventDefault();
          const query = (queryInput.value || "").trim();
          if (!query) {
            result.className = "result error";
            result.textContent = "Please type something first.";
            return;
          }

          result.className = "result";
          result.textContent = "Checking route information...";

          try {
            const response = await fetch(gatewayOrigin + "/template/call", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                action,
                payload: { query, source: "horizon" },
              }),
            });
            const data = await response.json().catch(function () { return null; });
            if (!response.ok) {
              throw new Error((data && data.error) || "request_failed");
            }
            result.className = "result ok";
            result.textContent = "Resolved route: " + JSON.stringify(data);
          } catch (error) {
            result.className = "result error";
            result.textContent = "Unable to resolve route: " + (error && error.message ? error.message : String(error));
          }
        });
      })();
    </script>
  </body>
</html>
