<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{SITE_TITLE}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"IBM Plex Mono"', "ui-monospace", "SFMono-Regular", "monospace"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-neutral-950 font-mono text-neutral-100">
    <div class="min-h-screen bg-[repeating-linear-gradient(45deg,#070707_0px,#070707_12px,#0f0f0f_12px,#0f0f0f_24px)] p-4 md:p-8">
      <main class="mx-auto max-w-6xl border-4 border-amber-300 bg-black shadow-[10px_10px_0_0_#111]">
        <header class="grid gap-3 border-b-4 border-amber-300 p-5 md:grid-cols-[1fr_auto] md:items-end">
          <div>
            <p class="text-xs uppercase tracking-[0.18em] text-amber-200/90">Gateway Console</p>
            <h1 class="mt-1 text-2xl font-bold uppercase md:text-4xl">{{SITE_TITLE}}</h1>
          </div>
          <p class="text-sm text-neutral-300">{{SITE_TAGLINE}}</p>
        </header>

        <section class="grid gap-4 p-5 md:grid-cols-[1fr_1fr]">
          <div class="space-y-4">
            <p class="text-xs uppercase tracking-[0.16em] text-neutral-400">{{INDEX_MODE_LABEL}}</p>
            <form id="search-form" class="grid gap-2 md:grid-cols-[1fr_auto]">
              <input
                id="query"
                name="query"
                type="search"
                required
                placeholder="{{SEARCH_PLACEHOLDER}}"
                class="border-2 border-amber-300 bg-black px-3 py-2 text-sm text-neutral-100 outline-none focus:ring-2 focus:ring-amber-300/40"
              />
              <button
                type="submit"
                class="border-2 border-amber-300 bg-amber-300 px-4 py-2 text-xs font-bold uppercase tracking-[0.18em] text-black hover:brightness-105"
              >
                Execute
              </button>
            </form>
            <pre id="search-result" class="min-h-[6rem] border-2 border-neutral-700 bg-neutral-950 p-3 text-xs text-neutral-200">Ready.</pre>
          </div>

          <aside class="space-y-3 border-2 border-neutral-800 bg-neutral-950/80 p-3">
            <div class="flex items-center justify-between gap-3">
              <h2 class="text-sm font-bold uppercase tracking-[0.16em] text-amber-200">Indexed Pages</h2>
              <button
                id="reshuffle"
                type="button"
                class="border border-neutral-600 px-2 py-1 text-[10px] uppercase tracking-[0.16em] text-neutral-200 hover:border-amber-300 hover:text-amber-200"
              >
                Shuffle
              </button>
            </div>
            <ul id="index-list" class="max-h-[24rem] space-y-2 overflow-auto pr-1 text-xs"></ul>
          </aside>
        </section>
      </main>
    </div>

    <script id="seed-index" type="application/json">{{INDEX_SEED_JSON}}</script>
    <script>
      (function () {
        function placeholderValue(value, fallback) {
          const text = String(value || "").trim();
          if (!text || /^\{\{.*\}\}$/.test(text)) return fallback;
          return text;
        }

        function parseJson(text, fallback) {
          try {
            return JSON.parse(text);
          } catch (_err) {
            return fallback;
          }
        }

        function extractIndexItems(data) {
          if (Array.isArray(data)) return data;
          if (!data || typeof data !== "object") return [];
          return data.items || (data.data && data.data.items) || data.sites || data.entries || data.list || data.results || [];
        }

        const gatewayOrigin = placeholderValue("{{GATEWAY_ORIGIN}}", "").replace(/\/+$/, "");
        const searchAction = placeholderValue("{{SEARCH_ACTION}}", "");
        const indexAction = placeholderValue("{{INDEX_ACTION}}", "").trim();
        const indexFetchMode = placeholderValue("{{INDEX_FETCH_MODE}}", "template_call").toLowerCase() === "public_read"
          ? "public_read"
          : "template_call";
        const publicIndexEndpoint = placeholderValue("{{PUBLIC_INDEX_ENDPOINT}}", "/api/public/site-index");
        const indexRequestBody = parseJson(placeholderValue("{{INDEX_REQUEST_BODY_JSON}}", "{}"), {});
        const indexLimit = Math.max(1, Number.parseInt("{{INDEX_LIMIT}}", 10) || 120);

        const form = document.getElementById("search-form");
        const queryInput = document.getElementById("query");
        const resultNode = document.getElementById("search-result");
        const listNode = document.getElementById("index-list");
        const reshuffleButton = document.getElementById("reshuffle");

        function draw(max) {
          if (max <= 0) return 0;
          if (window.crypto && typeof window.crypto.getRandomValues === "function") {
            const buf = new Uint32Array(1);
            window.crypto.getRandomValues(buf);
            return buf[0] % max;
          }
          return Math.floor(Math.random() * max);
        }

        function shuffle(values) {
          const arr = values.slice();
          for (let i = arr.length - 1; i > 0; i -= 1) {
            const j = draw(i + 1);
            const tmp = arr[i];
            arr[i] = arr[j];
            arr[j] = tmp;
          }
          return arr;
        }

        function safeJson(text, fallback) {
          try {
            return JSON.parse(text);
          } catch (_err) {
            return fallback;
          }
        }

        function normalize(item) {
          if (!item || typeof item !== "object") return null;
          const siteId = String(item.siteId || item["Site-Id"] || item.id || "").trim();
          const title = String(item.title || item.name || item.host || siteId || "").trim();
          const host = String(item.host || item.domain || "").trim();
          const path = String(item.path || item.route || "/").trim() || "/";
          const url = String(item.url || "").trim() || (host ? "https://" + host + (path.startsWith("/") ? path : "/" + path) : "");
          const query = String(item.query || host || path || siteId).trim();
          if (!title || !query) return null;
          return { siteId, title, host, path, url, query };
        }

        function setResult(text, kind) {
          if (kind === "ok") {
            resultNode.className = "min-h-[6rem] border-2 border-emerald-500 bg-emerald-900/20 p-3 text-xs text-emerald-100";
          } else if (kind === "error") {
            resultNode.className = "min-h-[6rem] border-2 border-rose-500 bg-rose-900/20 p-3 text-xs text-rose-100";
          } else {
            resultNode.className = "min-h-[6rem] border-2 border-neutral-700 bg-neutral-950 p-3 text-xs text-neutral-200";
          }
          resultNode.textContent = text;
        }

        function renderIndex(entries) {
          listNode.innerHTML = "";
          if (!entries.length) {
            const li = document.createElement("li");
            li.className = "border border-neutral-700 bg-black p-2 text-neutral-400";
            li.textContent = "No entries.";
            listNode.appendChild(li);
            return;
          }

          entries.forEach(function (entry) {
            const li = document.createElement("li");
            li.className = "border border-neutral-700 bg-neutral-900 p-2";
            const button = document.createElement("button");
            button.type = "button";
            button.className = "block w-full text-left";
            button.innerHTML =
              '<span class="block font-bold text-neutral-100">' +
              entry.title +
              "</span>" +
              '<span class="mt-1 block text-[10px] text-neutral-400">' +
              (entry.host || "site") +
              " " +
              (entry.path || "/") +
              "</span>";
            button.addEventListener("click", function () {
              queryInput.value = entry.query;
              queryInput.focus();
            });
            li.appendChild(button);
            listNode.appendChild(li);
          });
        }

        async function loadIndex() {
          const seedRaw = document.getElementById("seed-index");
          const seedData = safeJson(seedRaw ? seedRaw.textContent || "[]" : "[]", []);
          const seedList = Array.isArray(seedData) ? seedData : [];
          const seedNormalized = seedList.map(normalize).filter(Boolean);
          if (!indexAction) {
            renderIndex(shuffle(seedNormalized));
            return;
          }

          try {
            let response;
            let rawItems = [];

            if (indexFetchMode === "public_read") {
              response = await fetch(publicIndexEndpoint, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify(indexRequestBody && typeof indexRequestBody === "object" ? indexRequestBody : {}),
              });
            } else {
              const templateCallUrl = (gatewayOrigin ? gatewayOrigin : "") + "/template/call";
              response = await fetch(templateCallUrl, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({
                  action: indexAction,
                  payload: { limit: indexLimit },
                }),
              });
            }

            const data = await response.json().catch(function () { return {}; });
            if (!response.ok) {
              throw new Error((data && (data.error || data.code)) || "index_fetch_failed");
            }
            rawItems = extractIndexItems(data);
            const normalized = Array.isArray(rawItems) ? rawItems.map(normalize).filter(Boolean) : [];
            renderIndex(shuffle(normalized.length ? normalized : seedNormalized));
          } catch (_err) {
            renderIndex(shuffle(seedNormalized));
          }
        }

        async function submitSearch(event) {
          event.preventDefault();
          const query = String(queryInput.value || "").trim();
          if (!query) {
            setResult("Missing query.", "error");
            return;
          }

          setResult("Dispatching command ...", "info");
          try {
            const response = await fetch(gatewayOrigin + "/template/call", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                action: searchAction,
                payload: { query, path: query, host: query },
              }),
            });
            const data = await response.json().catch(function () { return null; });
            if (!response.ok) {
              throw new Error((data && (data.error || data.code)) || "request_failed");
            }
            setResult(JSON.stringify(data, null, 2), "ok");
          } catch (error) {
            setResult("Failure: " + (error && error.message ? error.message : String(error)), "error");
          }
        }

        form.addEventListener("submit", submitSearch);
        reshuffleButton.addEventListener("click", function () {
          const cards = Array.from(listNode.children);
          const shuffled = shuffle(cards);
          listNode.innerHTML = "";
          shuffled.forEach(function (node) {
            listNode.appendChild(node);
          });
        });

        loadIndex();
      })();
    </script>
  </body>
</html>
