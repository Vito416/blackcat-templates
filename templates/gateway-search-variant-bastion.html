<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{SITE_TITLE}}</title>
    <style>
      :root {
        --bg: #101010;
        --fg: #f5f5f5;
        --accent: #ffd400;
        --danger: #ff6d6d;
        --ok: #89ff90;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: repeating-linear-gradient(
          45deg,
          #0b0b0b 0px,
          #0b0b0b 14px,
          #111 14px,
          #111 28px
        );
        color: var(--fg);
        font-family: "IBM Plex Mono", "Courier New", monospace;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .frame {
        width: min(860px, 100%);
        border: 4px solid var(--accent);
        background: var(--bg);
        box-shadow: 10px 10px 0 #000;
      }

      .head {
        padding: 20px 24px;
        border-bottom: 4px solid var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 4.2vw, 2.4rem);
        text-transform: uppercase;
      }

      .tagline {
        margin: 0;
        color: #d8d8d8;
        font-size: 0.9rem;
      }

      .body {
        padding: 24px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      input,
      button {
        border: 3px solid var(--accent);
        border-radius: 0;
        background: #000;
        color: var(--fg);
        padding: 12px;
        font-family: inherit;
      }

      button {
        background: var(--accent);
        color: #151515;
        font-weight: 700;
        cursor: pointer;
      }

      #result {
        margin-top: 16px;
        border: 3px solid #343434;
        background: #0a0a0a;
        padding: 14px;
        min-height: 68px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      #result.ok {
        border-color: var(--ok);
      }

      #result.error {
        border-color: var(--danger);
      }

      @media (max-width: 700px) {
        .head {
          display: block;
        }

        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <header class="head">
        <h1>{{SITE_TITLE}}</h1>
        <p class="tagline">{{SITE_TAGLINE}}</p>
      </header>
      <section class="body">
        <label for="query">Lookup key</label>
        <form id="search-form" class="row">
          <input id="query" name="query" type="text" placeholder="route:/, page:home, domain:shop.example" required />
          <button type="submit">Run</button>
        </form>
        <pre id="result">Ready.</pre>
      </section>
    </main>

    <script>
      (function () {
        const gatewayOrigin = "{{GATEWAY_ORIGIN}}";
        const action = "{{SEARCH_ACTION}}";
        const form = document.getElementById("search-form");
        const queryInput = document.getElementById("query");
        const result = document.getElementById("result");

        form.addEventListener("submit", async function (event) {
          event.preventDefault();
          const query = (queryInput.value || "").trim();
          if (!query) {
            result.className = "error";
            result.textContent = "Missing query.";
            return;
          }

          result.className = "";
          result.textContent = "Sending to gateway...";

          try {
            const response = await fetch(gatewayOrigin + "/template/call", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                action,
                payload: { query, source: "bastion" },
              }),
            });
            const data = await response.json().catch(function () { return null; });
            if (!response.ok) {
              throw new Error((data && data.error) || "gateway_rejected");
            }

            result.className = "ok";
            result.textContent = JSON.stringify(data, null, 2);
          } catch (error) {
            result.className = "error";
            result.textContent = "Failure: " + (error && error.message ? error.message : String(error));
          }
        });
      })();
    </script>
  </body>
</html>
